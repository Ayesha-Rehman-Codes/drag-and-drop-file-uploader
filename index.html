<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag & Drop Uploader</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="uploader-container">
        <h2>Drag & Drop File Uploader</h2>
        
        <div class="drop-zone" id="dropZone">
            <span class="drop-zone__prompt">Drag & drop your image here or <label for="fileInput" class="file-label">browse</label></span>
            <input type="file" id="fileInput" class="drop-zone__input" accept="image/jpeg, image/png, image/gif">
        </div>

        <div id="errorMessage" class="error-message hidden"></div>

        <div id="progressContainer" class="progress-container hidden">
            <p>Uploading... <span id="progressText">0%</span></p>
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>
        </div>

        <div id="previewContainer" class="preview-container hidden">
            <h3>Uploaded Image Preview:</h3>
            <img id="imagePreview" src="" alt="Image Preview">
            <button id="clearBtn" class="clear-btn">Remove Image</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
